<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Main Card -->
    <div class="bg-white max-w-md w-full rounded-2xl shadow-lg p-6 space-y-4">

        <!-- Header -->
        <header class="text-center">
            <h1 class="text-3xl font-bold text-gray-800">
                AskMyNotes
            </h1>
            <p class="text-sm text-gray-500">
                Ask questions about your notes
            </p>
        </header>

        <!-- Question Input -->
        <input
            type="text"
            id="question"
            placeholder="Type your question..."
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >

        <!-- File Upload -->
        <input
            type="file"
            id="notes"
            accept=".txt,.pdf"
            class="w-full text-sm text-gray-600"
        >

        <!-- Ask Button -->
        <button
            id="submit"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition duration-300"
        >
            Ask
        </button>

        <!-- Output Box -->
        <div
            id="output"
            class="border border-gray-200 rounded-lg p-4 text-gray-700 bg-gray-50 min-h-[100px] flex items-center justify-center"
        >

            <!-- Loading Spinner -->
            <div
                id="loading"
                class="hidden flex flex-col items-center"
            >
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>

                <p class="mt-3 text-gray-500 text-sm">
                    Processing your notes...
                </p>
            </div>

            <!-- Answer -->
            <div id="answer">
                Answer will appear here...
            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script>

        const button = document.getElementById("submit");
        const loading = document.getElementById("loading");
        const answer = document.getElementById("answer");

        button.addEventListener("click", () => {

            // Hide current answer
            answer.classList.add("hidden");

            // Show spinner
            loading.classList.remove("hidden");

            // Simulate processing for 3 seconds
            setTimeout(() => {

                // Hide spinner
                loading.classList.add("hidden");

                // Show answer
                answer.classList.remove("hidden");

                answer.innerHTML = `
                    <strong>Answer:</strong><br><br>
                    This is where the AI-generated answer will appear after processing your uploaded notes.
                `;

            }, 3000);

        });

    </script>

</body>

</html>
